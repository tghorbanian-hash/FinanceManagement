<div class="navigation-wrapper" [dir]="'rtl'">
  <aside *ngIf="viewMode === 'tree'" class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-box">H</div>
        <span>پنل مدیریت هوشمند</span>
      </div>
      <button (click)="setViewMode('tile')" class="icon-btn" title="نمایش کاشی‌وار">
        <i class="grid-icon"></i>
      </button>
    </div>

    <div class="sidebar-content">
      <div class="section-label">دسترسی سریع</div>
      <div class="fav-list">
        <div *ngFor="let fav of favoriteItems" class="fav-item">
          <span class="star-icon filled">★</span>
          <span>{{ fav.label_fa }}</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="tree-menu">
        <ng-container *ngTemplateOutlet="recursiveMenu; context:{ $implicit: treeData, depth: 0 }"></ng-container>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="search-container">
        <input 
          type="text" 
          [(ngModel)]="searchTerm" 
          placeholder="جستجو در فرم‌ها و کدها..."
          class="search-input"
        />
        <div *ngIf="searchTerm" class="search-results">
          <div *ngFor="let item of filteredForms" class="search-item">
            <span class="item-label">{{ item.label_fa }}</span>
            <span class="item-code">{{ item.unique_code }}</span>
          </div>
        </div>
      </div>

      <div class="header-actions">
        <button *ngIf="viewMode === 'tile'" (click)="setViewMode('tree')" class="action-btn">
          نمایش درختی
        </button>
        <div class="user-profile">
          <div class="avatar">U</div>
        </div>
      </div>
    </header>

    <div *ngIf="viewMode === 'tile'" class="tile-grid">
      <div *ngFor="let domain of treeData" class="domain-card">
        <div class="card-header">
          <div class="card-icon"></div>
          <h3>{{ domain.label_fa }}</h3>
        </div>
        <div class="card-body">
          <div *ngFor="let child of domain.children | slice:0:5" class="card-link">
            {{ child.label_fa }}
          </div>
          <div *ngIf="domain.children && domain.children.length > 5" class="more-link">
            و {{ domain.children.length - 5 }} مورد دیگر...
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<ng-template #recursiveMenu let-items let-depth="depth">
  <div *ngFor="let node of items" class="node-wrapper">
    <div 
      class="node-item" 
      [style.padding-right.px]="depth * 20 + 15"
      (click)="toggleNode(node.id)"
      [class.active]="expandedNodes[node.id]"
    >
      <span *ngIf="node.children && node.children.length" class="arrow">
        {{ expandedNodes[node.id] ? '▼' : '◀' }}
      </span>
      <span class="label">{{ node.label_fa }}</span>
      <button 
        *ngIf="node.menu_type === 'form'" 
        (click)="toggleFavorite($event, node.id)"
        class="fav-toggle"
      >
        <span [class.filled]="favorites.has(node.id)">{{ favorites.has(node.id) ? '★' : '☆' }}</span>
      </button>
    </div>
    <div *ngIf="expandedNodes[node.id] && node.children" class="children-box">
      <ng-container *ngTemplateOutlet="recursiveMenu; context:{ $implicit: node.children, depth: depth + 1 }"></ng-container>
    </div>
  </div>
</ng-template>
