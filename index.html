<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <!-- ... (بخش هد بدون تغییر می‌ماند) ... -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم یکپارچه سازمانی (جدید)</title>
    <link rel="icon" href="data:,">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Vazirmatn', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <style>
        body { font-family: 'Vazirmatn', sans-serif !important; margin: 0; overflow: hidden; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- اسکریپت‌های مربوط به دیزاین سیستم (حذف data-type="module") -->
    <script type="text/babel" data-presets="react" src="./DSCore.js"></script>
    <script type="text/babel" data-presets="react" src="./DSFeedback.js"></script>
    <script type="text/babel" data-presets="react" src="./DSGrid.js"></script>
    <script type="text/babel" data-presets="react" src="./DSTree.js"></script>
    <script type="text/babel" data-presets="react" src="./DesignSystem.js"></script>

    <!-- فایل Showcase -->
    <script type="text/babel" data-presets="react" src="./general/ComponentShowcase.js"></script>
    
    <!-- در صورتی که فایل‌های زیر (app, NavigationSystem, NotificationSidebar) 
         دارای import/export هستند، می‌توانید data-type="module" را نگه دارید. 
         در غیر این صورت، از آن‌ها هم حذف کنید. برای اطمینان فعلا حذف می‌کنیم تا دیزاین سیستم لود شود. -->
    <script type="text/babel" data-presets="react" src="./NotificationSidebar.js"></script>
    <script type="text/babel" data-presets="react" src="./NavigationSystem.js"></script>
    <script type="text/babel" data-presets="react" src="./supabaseConfig.js"></script>
    <script type="text/babel" data-presets="react" src="./app.js"></script>
</body>
</html>
