<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FM - Financial Management System</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    const savedTheme = window.localStorage.getItem('fm_theme') || 'light';
    if (savedTheme === 'dark') document.documentElement.classList.add('dark');
  </script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Vazirmatn', 'sans-serif'],
            mono: ['Fira Code', 'monospace']
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Vazirmatn', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      @apply bg-[#f8fafc] text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300;
    }

    .font-mono {
      font-family: 'Fira Code', monospace;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #475569;
    }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Loader Animation */
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4f46e5;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }
    
    .dark .loader {
      border: 3px solid #1e293b;
      border-top: 3px solid #6366f1;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #root {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="flex items-center justify-center h-full w-full bg-slate-50 dark:bg-slate-900">
      <div class="loader"></div>
    </div>
  </div>

  <script src="./supabaseConfig.js"></script>
  <script type="text/babel" src="./DSCore.js"></script>
  <script type="text/babel" src="./DSFeedback.js"></script>
  <script type="text/babel" src="./DSGrid.js"></script>
  <script type="text/babel" src="./DSTree.js"></script>
  <script type="text/babel" src="./DSCharts.js"></script>
  <script type="text/babel" src="./DSOverlays.js"></script>
  <script type="text/babel" src="./DesignSystem.js"></script>
  
  <script type="text/babel" src="./NotificationSidebar.js"></script>
  <script type="text/babel" src="./NavigationSystem.js"></script>

  <script type="text/babel" src="./general/ComponentShowcase.js"></script>
  <script type="text/babel" src="./general/CurrencySettings.js"></script>
  
  <script type="text/babel" src="./app.js"></script>
</body>
</html>
